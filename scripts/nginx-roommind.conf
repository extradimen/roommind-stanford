# RoomMind 外网访问（80 端口反代，避免 518x 端口被运营商/安全组拦截）
# 安装: sudo cp scripts/nginx-roommind.conf /etc/nginx/sites-available/roommind
#       sudo ln -sf /etc/nginx/sites-available/roommind /etc/nginx/sites-enabled/roommind
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    # Stanford 学员端（默认首页）
    location / {
        proxy_pass http://127.0.0.1:5183;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Stanford 管理后台
    location /stanford-admin/ {
        proxy_pass http://127.0.0.1:5182/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 原版 RoomMind 学员端
    location /classic/ {
        proxy_pass http://127.0.0.1:5181/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 原版管理后台
    location /classic-admin/ {
        proxy_pass http://127.0.0.1:5180/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
