services:
  postgres:
    image: postgres:16-alpine
    container_name: roommind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roommind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roommind_dev}
      POSTGRES_DB: ${POSTGRES_DB:-roommind}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - roommind_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roommind}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: roommind-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - roommind_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  roommind_pg_data:
  roommind_redis_data:
